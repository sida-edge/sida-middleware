networks:
  sida_network:
    driver: bridge

services:
  sida-core:
    build: ./sida-core  
    container_name: sida-core
    ports:
      - "8000:8000"
    volumes:
      - ./sida-core/data:/app/data
      - sida_ipc:/tmp/.ipc
    networks:
      - sida_network
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: sida-neo4j
    environment:
      - NEO4J_AUTH=neo4j/sida_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - sida_network
    restart: unless-stopped

  ontology-builder:
    build: ./sida-ontology-builder
    container_name: sida-ontology-builder
    environment:
      - TZ=America/Recife
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=sida_password
      - ZMQ_ENDPOINT=tcp://sida-core:5556
    volumes:
      - sida_ipc:/tmp/.ipc
    networks:
      - sida_network
    depends_on:
      - sida-core
      - neo4j
    restart: unless-stopped

  poc-ingestion:
    build:
      context: .
      dockerfile: ./infra/Dockerfile
      args:
        - PROJECT_DIR=./core/ingestion
    container_name: sida-poc-ingestion
    environment:
      - TZ=America/Recife
      - FLOWS=flows.json
    ports:
      - "1881:1880"
    volumes:
      - ./core/ingestion:/data
      - sida_ipc:/tmp/.ipc
    networks:
      - sida_network
    extra_hosts:
     - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - sida-core
    attach: false
  
  poc-context:
    build:
      context: .
      dockerfile: ./infra/Dockerfile
      args:
        - PROJECT_DIR=./core/context
    container_name: sida-poc-context
    environment:
      - TZ=America/Recife
      - FLOWS=flows.json
    ports:
      - "1882:1880"
    volumes:
      - ./core/context:/data
      - sida_ipc:/tmp/.ipc
    networks:
      - sida_network
    restart: unless-stopped
    depends_on:
      - sida-core
    attach: false

  poc-delivery:
    build:
      context: .
      dockerfile: ./infra/Dockerfile
      args:
        - PROJECT_DIR=./core/delivery
    container_name: sida-poc-delivery
    environment:
      - TZ=America/Recife
      - FLOWS=flows.json
    ports:
      - "1883:1880"
    volumes:
      - ./core/delivery:/data
      - sida_ipc:/tmp/.ipc
    networks:
      - sida_network
    restart: unless-stopped
    depends_on:
      - sida-core
    attach: false

  plc-simulator:
    image: ghcr.io/sida-edge/simulador:latest
    container_name: sida-simulator
    profiles:
      - "sim"
    environment:
      - DISPLAY=host.docker.internal:0
    ports:
      - "5020:5020"
    restart: unless-stopped
    attach: false

volumes:
  sida_ipc:
  neo4j_data: