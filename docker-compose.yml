networks:
  sida_network:
    driver: bridge

services:
  sida-core:
    build: ./sida-core  
    container_name: sida-core
    ports:
      - "8000:8000"
    volumes:
      - ./sida-core/data:/app/data
    networks:
      - sida_network
    restart: unless-stopped

  poc-ingestion:
    build:
      context: .
      dockerfile: ./infra/Dockerfile
      args:
        - PROJECT_DIR=./core/ingestion
    container_name: sida-poc-ingestion
    environment:
      - TZ=America/Recife
      - FLOWS=flows.json
    ports:
      - "1881:1880"
    volumes:
      - ./core/ingestion:/data
      - sida_ipc:/tmp/.ipc
    networks:
      - sida_network
    extra_hosts:
     - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - sida-core
  
  poc-context:
    build:
      context: .
      dockerfile: ./infra/Dockerfile
      args:
        - PROJECT_DIR=./core/context
    container_name: sida-poc-context
    environment:
      - TZ=America/Recife
      - FLOWS=flows.json
    ports:
      - "1882:1880"
    volumes:
      - ./core/context:/data
      - sida_ipc:/tmp/.ipc
    networks:
      - sida_network
    restart: unless-stopped
    depends_on:
      - sida-core

  poc-delivery:
    build:
      context: .
      dockerfile: ./infra/Dockerfile
      args:
        - PROJECT_DIR=./core/delivery
    container_name: sida-poc-delivery
    environment:
      - TZ=America/Recife
      - FLOWS=flows.json
    ports:
      - "1883:1880"
    volumes:
      - ./core/delivery:/data
      - sida_ipc:/tmp/.ipc
    networks:
      - sida_network
    restart: unless-stopped
    depends_on:
      - sida-core

  plc-simulator:
    image: ghcr.io/sida-edge/simulador:latest
    container_name: sida-simulator
    profiles:
      - "sim"
    environment:
      - DISPLAY=host.docker.internal:0
    ports:
      - "5020:5020"
    restart: unless-stopped

volumes:
  sida_ipc: